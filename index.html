<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>视觉创作中心</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #res-img { width: 100%; margin-top: 20px; border-radius: 10px; display: none; border: 1px solid #eee; }
        .status { margin-top: 15px; text-align: center; color: #666; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center">🎨 视觉创作中心</h2>
    <input type="password" id="pw" placeholder="输入访问密码 (661500)">
    <textarea id="prompt" rows="3" placeholder="描述你想要生成的画面..."></textarea>
    <button id="btn" onclick="submit()">开始生成</button>
    <div id="st" class="status"></div>
    <img id="res-img" alt="生成的图像">
</div>

<script>
    let pollInterval = null;

    async function submit() {
        const prompt = document.getElementById('prompt').value;
        const pw = document.getElementById('pw').value;
        const st = document.getElementById('st');
        const btn = document.getElementById('btn');
        const img = document.getElementById('res-img');

        if (!prompt || !pw) return alert("请完整填写");

        btn.disabled = true;
        img.style.display = "none";
        st.innerText = "🚀 任务启动中...";

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, pass: pw })
            });
            const data = await res.json();

            // 提取 Task ID
            const tid = data.task_id || data.data?.[0]?.task_id;

            if (tid) {
                startPolling(tid, pw);
            } else if (data.url || data.data?.[0]?.url) {
                finish(data.url || data.data?.[0]?.url);
            } else {
                throw new Error(data.error || "未获取到任务ID");
            }
        } catch (e) {
            st.innerText = "❌ 启动失败: " + e.message;
            btn.disabled = false;
        }
    }

    function startPolling(tid, pw) {
        const st = document.getElementById('st');
        let count = 0;

        pollInterval = setInterval(async () => {
            count += 3;
            st.innerText = `⏳ AI 绘图中 (已等待 ${count}s)...`;

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId: tid, pass: pw })
                });
                const data = await res.json();

                // 尝试各种可能的图片路径
                let imgUrl = null;
                if (data.url) imgUrl = data.url;
                else if (data.data?.[0]?.url) imgUrl = data.data[0].url;
                else if (data.images?.[0]) imgUrl = data.images[0];

                if (imgUrl) {
                    clearInterval(pollInterval);
                    finish(imgUrl);
                }
                
                if (data.status === 'failed') {
                    clearInterval(pollInterval);
                    st.innerText = "❌ 生成失败";
                    document.getElementById('btn').disabled = false;
                }
            } catch (e) {
                console.warn("查询跳过一次...");
            }

            if (count > 150) {
                clearInterval(pollInterval);
                st.innerText = "❌ 等待超时，请刷新页面";
                document.getElementById('btn').disabled = false;
            }
        }, 3000);
    }

    function finish(url) {
        const img = document.getElementById('res-img');
        const st = document.getElementById('st');
        img.src = url;
        img.style.display = "block";
        st.innerText = "✅ 生成成功！";
        document.getElementById('btn').disabled = false;
    }
</script>

</body>
</html>
