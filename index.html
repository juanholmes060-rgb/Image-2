<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司视觉工作站 - GPT-Image-2</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; }
        .hidden { display: none; }
        input, textarea, button { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: 1px solid #ddd; border-radius: 0.8rem; box-sizing: border-box; font-size: 1rem; }
        button { background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #333; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #result-img { width: 100%; border-radius: 1rem; margin-top: 1rem; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .status-msg { margin-top: 1rem; font-size: 0.9rem; color: #666; }
        .error-log { color: #ff4d4f; font-size: 0.8rem; margin-top: 1rem; word-break: break-all; background: #fff1f0; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div id="login-view" class="container">
        <h2>🔐 内部系统登录</h2>
        <input type="password" id="access-pw" placeholder="请输入访问密码 (661500)">
        <button onclick="handleLogin()">进入工作站</button>
    </div>

    <div id="app-view" class="container hidden">
        <h2 style="margin-top:0">🖼️ GPT-Image-2 工作站</h2>
        <textarea id="prompt-input" rows="4" placeholder="描述你想要的画面..."></textarea>
        <button id="submit-btn" onclick="generateImage()">开始生成</button>
        <div id="status-text" class="status-msg"></div>
        <img id="result-img">
        <div id="error-log" class="error-log"></div>
    </div>

    <script>
        const PASS = "661500"; 
        let pollTimer = null;

        function handleLogin() {
            if (document.getElementById('access-pw').value === PASS) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
            } else { alert("密码错误"); }
        }

        async function generateImage() {
            const prompt = document.getElementById('prompt-input').value;
            const btn = document.getElementById('submit-btn');
            const status = document.getElementById('status-text');
            const img = document.getElementById('result-img');
            const errLog = document.getElementById('error-log');

            if (!prompt) return alert("内容不能为空");

            btn.disabled = true;
            img.style.display = "none";
            errLog.style.display = "none";
            status.innerText = "🚀 任务已提交，API Mart 正在排队生图...";

            try {
                // 1. 提交初始任务
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, pass: PASS })
                });
                const data = await res.json();

                // 2. 判断返回结果
                if (data.data && data.data[0] && data.data[0].url) {
                    // 情况 A：直接拿到了 URL (极少见)
                    showImage(data.data[0].url);
                } else if (data.data && data.data[0] && data.data[0].task_id) {
                    // 情况 B：拿到了 task_id (API Mart 常见情况)
                    const taskId = data.data[0].task_id;
                    startPolling(taskId);
                } else {
                    throw new Error(JSON.stringify(data));
                }
            } catch (e) {
                btn.disabled = false;
                status.innerText = "❌ 任务启动失败";
                errLog.innerText = e.message;
                errLog.style.display = "block";
            }
        }

        // 轮询逻辑：每 3 秒查一次
        async function startPolling(taskId) {
            const status = document.getElementById('status-text');
            const btn = document.getElementById('submit-btn');
            
            let attempts = 0;
            pollTimer = setInterval(async () => {
                attempts++;
                status.innerText = `⏳ 正在生图 (第 ${attempts} 次询问)...`;

                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ task_id: taskId, pass: PASS })
                    });
                    const data = await res.json();

                    // 检查图片是否准备好
                    if (data.data && data.data[0] && data.data[0].url) {
                        clearInterval(pollTimer);
                        showImage(data.data[0].url);
                    } else if (attempts > 30) { // 90秒超时限制
                        clearInterval(pollTimer);
                        status.innerText = "❌ 生成超时，请刷新重试";
                        btn.disabled = false;
                    }
                } catch (e) {
                    console.error("轮询出错", e);
                }
            }, 3000);
        }

        function showImage(url) {
            const img = document.getElementById('result-img');
            const status = document.getElementById('status-text');
            const btn = document.getElementById('submit-btn');
            img.src = url;
            img.style.display = "block";
            status.innerText = "✅ 生成完成！";
            btn.disabled = false;
        }
    </script>
</body>
</html>
