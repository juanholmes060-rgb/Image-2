<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视觉中心</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #res-img { width: 100%; border-radius: 12px; margin-top: 15px; display: none; border: 1px solid #eee; }
        .status { text-align: center; margin: 15px 0; font-size: 14px; color: #666; }
        .action-box { display: none; margin-top: 15px; background: #fafafa; padding: 15px; border-radius: 12px; border: 1px dashed #ddd; }
        .url-link { color: #007aff; font-size: 11px; word-break: break-all; margin-bottom: 12px; display: block; text-decoration: none; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .s-btn { background: #444; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="text-align:center">🎨 视觉创作中心</h3>
    <input type="password" id="pw" placeholder="访问密码">
    <textarea id="pt" rows="3" placeholder="描述想要生成的画面..."></textarea>
    <button id="main-btn" onclick="submitTask()">生成图像</button>
    
    <div id="status" class="status">就绪</div>
    <img id="res-img">

    <div id="action-box" class="action-box">
        <strong style="font-size: 12px; display:block; margin-bottom: 5px;">图片直链：</strong>
        <a id="url-text" class="url-link" target="_blank">点击查看原图</a>
        <div class="btn-row">
            <button class="s-btn" onclick="copyUrl()">复制地址</button>
            <button class="s-btn" style="background:#28a745" onclick="downloadImg()">保存图片</button>
        </div>
    </div>
</div>

<script>
    let pollTimer = null;
    let imgUrl = "";

    async function submitTask() {
        const pt = document.getElementById('pt').value;
        const pw = document.getElementById('pw').value;
        const status = document.getElementById('status');
        const btn = document.getElementById('main-btn');

        if (!pt || !pw) return alert("请完整填写");
        
        btn.disabled = true;
        document.getElementById('res-img').style.display = "none";
        document.getElementById('action-box').style.display = "none";
        status.innerText = "🚀 任务提交中...";

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: pt, pass: pw })
            });
            const data = await res.json();
            
            // 提取 Task ID
            const tid = data.task_id || (data.data && data.data[0] && data.data[0].task_id);
            
            if (tid) {
                startPolling(tid, pw);
            } else {
                const url = findUrl(data);
                if (url) renderResult(url);
                else throw new Error("API 未返回任务 ID 或图片地址");
            }
        } catch (e) {
            status.innerText = "❌ 错误: " + e.message;
            btn.disabled = false;
        }
    }

    function startPolling(tid, pw) {
        const status = document.getElementById('status');
        let count = 0;
        
        pollTimer = setInterval(async () => {
            count += 3;
            status.innerText = `⏳ 正在绘制 (${count}s)...`;
            
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId: tid, pass: pw })
                });
                const data = await res.json();
                const url = findUrl(data);
                
                if (url) {
                    clearInterval(pollTimer);
                    renderResult(url);
                }
            } catch (e) {}

            if (count > 120) {
                clearInterval(pollTimer);
                status.innerText = "❌ 生成超时，请稍后刷新日志查看";
                document.getElementById('main-btn').disabled = false;
            }
        }, 3000);
    }

    function findUrl(obj) {
        if (!obj) return null;
        // 如果本身就是 https 开头的字符串
        if (typeof obj === 'string' && obj.startsWith('http')) return obj;
        // API Mart 常见的嵌套结构
        if (obj.url) return obj.url;
        if (obj.data && obj.data[0] && obj.data[0].url) return obj.data[0].url;
        // 扫描所有属性（防止 API 结构变动）
        for (let key in obj) {
            if (typeof obj[key] === 'object') {
                const found = findUrl(obj[key]);
                if (found) return found;
            } else if (typeof obj[key] === 'string' && obj[key].startsWith('http')) {
                return obj[key];
            }
        }
        return null;
    }

    function renderResult(url) {
        imgUrl = url;
        const img = document.getElementById('res-img');
        const box = document.getElementById('action-box');
        const link = document.getElementById('url-text');
        
        img.src = url;
        img.style.display = "block";
        link.innerText = url;
        link.href = url;
        box.style.display = "block";
        document.getElementById('status').innerText = "✅ 生成完成！";
        document.getElementById('main-btn').disabled = false;
    }

    function copyUrl() {
        navigator.clipboard.writeText(imgUrl).then(() => alert("地址已复制"));
    }

    async function downloadImg() {
        // 尝试通过 Blob 下载以避免浏览器直接打开
        try {
            const r = await fetch(imgUrl);
            const b = await r.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = `AI_Image_${Date.now()}.png`;
            a.click();
        } catch(e) {
            window.open(imgUrl, '_blank');
        }
    }
</script>
</body>
</html>
