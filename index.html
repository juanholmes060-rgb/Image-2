<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 绘图工作站</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        button:disabled { background: #ccc; }
        #res-img { width: 100%; margin-top: 20px; border-radius: 10px; display: none; }
        .st { margin-top: 15px; text-align: center; color: #666; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h2>🎨 视觉创作中心</h2>
    <input type="password" id="pw" placeholder="访问密码">
    <textarea id="pt" rows="3" placeholder="描述画面..."></textarea>
    <button id="btn" onclick="go()">开始生成</button>
    <div id="st" class="st"></div>
    <img id="res-img">
</div>

<script>
    let itv = null;

    async function go() {
        const pt = document.getElementById('pt').value;
        const pw = document.getElementById('pw').value;
        const st = document.getElementById('st');
        const btn = document.getElementById('btn');
        
        if(!pt || !pw) return alert("信息不全");
        btn.disabled = true;
        st.innerText = "🚀 正在提交任务...";

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: pt, pass: pw })
            });
            const data = await res.json();
            
            // 自动寻找 taskId
            const tid = data.task_id || (data.data && data.data[0] && data.data[0].task_id);

            if (tid) {
                poll(tid, pw);
            } else {
                const url = find(data);
                if (url) show(url); else throw new Error("未获取到任务ID");
            }
        } catch (e) {
            st.innerText = "❌ 失败: " + e.message;
            btn.disabled = false;
        }
    }

    async function poll(tid, pw) {
        const st = document.getElementById('st');
        let sec = 0;
        itv = setInterval(async () => {
            sec += 3;
            st.innerText = `⏳ 绘图中 (${sec}s)...`;
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId: tid, pass: pw })
                });
                const data = await res.json();
                const url = find(data);
                if (url) {
                    clearInterval(itv);
                    show(url);
                }
            } catch (e) {}
            if (sec > 150) { clearInterval(itv); st.innerText = "❌ 超时"; btn.disabled = false; }
        }, 3000);
    }

    function find(o) {
        if (!o) return null;
        if (o.url) return o.url;
        if (o.data && o.data[0] && o.data[0].url) return o.data[0].url;
        if (o.images && o.images[0]) return o.images[0];
        for (let k in o) { if (typeof o[k] === 'object') { const f = find(o[k]); if (f) return f; } }
        return null;
    }

    function show(u) {
        const img = document.getElementById('res-img');
        img.src = u;
        img.style.display = "block";
        document.getElementById('st').innerText = "✅ 完成！";
        document.getElementById('btn').disabled = false;
    }
</script>
</body>
</html>
