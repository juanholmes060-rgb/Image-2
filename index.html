<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GPT-Image-2 视觉中心</title>
    <style>
        body { font-family: sans-serif; background: #f7f7f9; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); width: 400px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #res-img { width: 100%; margin-top: 20px; border-radius: 12px; display: none; }
        .status { margin-top: 15px; text-align: center; font-size: 13px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center">🎨 视觉创作中心</h2>
    <input type="password" id="pw" placeholder="访问密码">
    <textarea id="pt" rows="3" placeholder="输入绘画描述..."></textarea>
    <button id="btn" onclick="run()">开始生成</button>
    <div id="st" class="status"></div>
    <img id="res-img">
</div>

<script>
    let timer = null;

    async function run() {
        const prompt = document.getElementById('pt').value;
        const pw = document.getElementById('pw').value;
        const st = document.getElementById('st');
        const btn = document.getElementById('btn');
        
        if(!prompt || !pw) return alert("请填写完整");
        
        btn.disabled = true;
        st.innerText = "🚀 正在提交任务...";
        document.getElementById('res-img').style.display = "none";

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, pass: pw })
            });
            const data = await res.json();

            // 提取任务 ID (支持多种结构)
            const tid = data.task_id || (data.data && data.data[0] && data.data[0].task_id);

            if (tid) {
                poll(tid, pw);
            } else {
                // 尝试直接找 URL
                const quickUrl = findUrl(data);
                if (quickUrl) show(quickUrl);
                else throw new Error("未获取到任务ID或图片链接");
            }
        } catch (e) {
            st.innerText = "❌ 失败: " + e.message;
            btn.disabled = false;
        }
    }

    async function poll(tid, pw) {
        const st = document.getElementById('st');
        let sec = 0;

        timer = setInterval(async () => {
            sec += 3;
            st.innerText = `⏳ 绘图中 (${sec}s)...`;

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId: tid, pass: pw })
                });
                const data = await res.json();

                const finalUrl = findUrl(data);
                if (finalUrl) {
                    clearInterval(timer);
                    show(finalUrl);
                }

                if (data.status === 'failed') {
                    clearInterval(timer);
                    st.innerText = "❌ 生成失败";
                    document.getElementById('btn').disabled = false;
                }
            } catch (e) {}

            if (sec > 120) {
                clearInterval(timer);
                st.innerText = "❌ 超时，请刷新页面";
                document.getElementById('btn').disabled = false;
            }
        }, 3000);
    }

    // 暴力搜索 JSON 对象中的图片链接
    function findUrl(obj) {
        if (!obj) return null;
        // 常见的几种存放路径
        if (typeof obj.url === 'string') return obj.url;
        if (obj.data && obj.data[0] && obj.data[0].url) return obj.data[0].url;
        if (obj.images && obj.images[0]) return obj.images[0];
        // 递归深层查找
        for (let key in obj) {
            if (typeof obj[key] === 'object') {
                const found = findUrl(obj[key]);
                if (found) return found;
            }
        }
        return null;
    }

    function show(url) {
        const img = document.getElementById('res-img');
        img.src = url;
        img.style.display = "block";
        document.getElementById('st').innerText = "✅ 生成成功！";
        document.getElementById('btn').disabled = false;
    }
</script>
</body>
</html>
