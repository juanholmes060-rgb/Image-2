<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视觉创作站</title>
    <style>
        :root { --primary: #007aff; --bg: #f5f5f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 440px; }
        #login-screen { text-align: center; padding: 40px 0; }
        #main-app { display: none; }
        h2 { margin-top: 0; font-size: 22px; color: #1d1d1f; text-align: center; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #86868b; margin-bottom: 5px; margin-left: 5px; font-weight: 500; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 12px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.2s; }
        .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:disabled { background: #d2d2d7; cursor: not-allowed; }
        .ref-box { border: 2px dashed #d2d2d7; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; position: relative; }
        #ref-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; display: none; margin: 0 auto; }
        .ref-hint { font-size: 13px; color: #86868b; }
        .clear-ref { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; line-height: 20px; display: none; }
        #res-img { width: 100%; border-radius: 12px; display: none; margin-top: 20px; border: 1px solid #eee; }
        .status { text-align: center; margin: 15px 0; font-size: 14px; color: #666; min-height: 20px; }
        #download-box { display: none; margin-top: 15px; text-align: center; }
        .save-btn { background: #10b981; margin-top: 0; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-screen">
        <h2>验证身份</h2>
        <input type="password" id="access-pw" placeholder="输入访问密码">
        <button onclick="checkLogin()">进入工作站</button>
    </div>

    <div id="main-app">
        <h2>🎨 视觉创作中心</h2>
        <div class="group">
            <label>画面描述</label>
            <textarea id="prompt" rows="3" placeholder="写下你的创意..."></textarea>
        </div>
        <div class="group">
            <label>参考图 (可选)</label>
            <div class="ref-box" onclick="document.getElementById('ref-file').click()">
                <div id="ref-placeholder"><span class="ref-hint">点击上传 (会自动压缩)</span></div>
                <img id="ref-preview">
                <div id="clear-ref" class="clear-ref" onclick="clearRef(event)">✕</div>
                <input type="file" id="ref-file" hidden accept="image/*" onchange="processFile(this)">
            </div>
        </div>
        <div class="grid-select">
            <div class="group"><label>比例</label><select id="ratio"><option value="1:1">1:1</option><option value="9:16">9:16</option><option value="16:9">16:9</option><option value="4:3">4:3</option></select></div>
            <div class="group"><label>清晰度</label><select id="pixel"><option value="1024">1K</option><option value="2048">2K</option></select></div>
        </div>
        <button id="gen-btn" onclick="handleGenerate()">开始生成</button>
        <div id="status" class="status">就绪</div>
        <img id="res-img">
        <div id="download-box"><button class="save-btn" onclick="saveImage()">💾 保存图片</button></div>
    </div>
</div>

<script>
    let globalPass = "", currentImgUrl = "", refBase64 = "";

    function checkLogin() {
        const pw = document.getElementById('access-pw').value;
        if(pw === "661500") {
            globalPass = pw;
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('main-app').style.display = "block";
        } else alert("密码错误");
    }

    // --- 核心：图片压缩处理 ---
    function processFile(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width, height = img.height;
                // 限制最大长边为 800px，既能保留参考特征，又能极大地减小体积
                const maxSide = 800;
                if (width > height) {
                    if (width > maxSide) { height = Math.round(height * maxSide / width); width = maxSide; }
                } else {
                    if (height > maxSide) { width = Math.round(width * maxSide / height); height = maxSide; }
                }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // 压缩质量设为 0.7
                refBase64 = canvas.toDataURL('image/jpeg', 0.7);
                
                document.getElementById('ref-preview').src = refBase64;
                document.getElementById('ref-preview').style.display = "block";
                document.getElementById('ref-placeholder').style.display = "none";
                document.getElementById('clear-ref').style.display = "block";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function clearRef(e) {
        e.stopPropagation(); refBase64 = "";
        document.getElementById('ref-file').value = "";
        document.getElementById('ref-preview').style.display = "none";
        document.getElementById('ref-placeholder').style.display = "block";
        document.getElementById('clear-ref').style.display = "none";
    }

    async function handleGenerate() {
        const prompt = document.getElementById('prompt').value, ratio = document.getElementById('ratio').value, pixel = document.getElementById('pixel').value;
        const status = document.getElementById('status'), btn = document.getElementById('gen-btn');
        if(!prompt) return alert("写点什么吧");

        let size = "1024x1024";
        if(ratio === "9:16") size = `${Math.floor(pixel*0.56)}x${pixel}`;
        else if(ratio === "16:9") size = `${pixel}x${Math.floor(pixel*0.56)}`;
        else if(ratio === "4:3") size = `${pixel}x${Math.floor(pixel*0.75)}`;
        else size = `${pixel}x${pixel}`;

        btn.disabled = true;
        document.getElementById('res-img').style.display = "none";
        document.getElementById('download-box').style.display = "none";
        status.innerText = "🚀 AI 正在构思中...";

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, pass: globalPass, size, ref_image: refBase64 })
            });
            const data = await res.json();
            const tid = data.task_id || (data.data?.[0]?.task_id);
            if(tid) startPolling(tid); else {
                const u = findUrl(data);
                if(u) renderResult(u); else throw new Error(data.error?.message || "启动失败");
            }
        } catch(e) { status.innerText = "❌ 错误: " + e.message; btn.disabled = false; }
    }

    function startPolling(tid) {
        let sec = 0;
        const timer = setInterval(async () => {
            sec += 3; document.getElementById('status').innerText = `⏳ 正在努力渲染 (${sec}s)...`;
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId: tid, pass: globalPass })
                });
                const data = await res.json();
                const u = findUrl(data);
                if(u) { clearInterval(timer); renderResult(u); }
            } catch(e) {}
        }, 3000);
    }

    function findUrl(o) {
        if(!o) return null;
        if(typeof o === 'string' && o.startsWith('http')) return o;
        if(o.url) return o.url;
        if(o.data?.[0]?.url) return o.data[0].url;
        for(let k in o) { if(typeof o[k] === 'object') { const f = findUrl(o[k]); if(f) return f; } }
        return null;
    }

    function renderResult(url) {
        currentImgUrl = url;
        const img = document.getElementById('res-img');
        img.src = url; img.style.display = "block";
        document.getElementById('download-box').style.display = "block";
        document.getElementById('status').innerText = "✅ 渲染完成！";
        document.getElementById('gen-btn').disabled = false;
    }

    async function saveImage() {
        try {
            const res = await fetch(currentImgUrl);
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `AI_Work_${Date.now()}.png`;
            a.click();
        } catch(e) { window.open(currentImgUrl, '_blank'); }
    }
</script>
</body>
</html>
