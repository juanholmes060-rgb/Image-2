<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司视觉工作站 - GPT-Image-2</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; }
        .hidden { display: none; }
        input, textarea, button { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: 1px solid #ddd; border-radius: 0.8rem; box-sizing: border-box; font-size: 1rem; }
        button { background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #333; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #result-img { width: 100%; border-radius: 1rem; margin-top: 1rem; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .error-box { color: #ff4d4f; font-size: 0.9rem; margin-top: 0.5rem; word-break: break-all; }
        .raw-log { font-size: 0.7rem; color: #999; margin-top: 0.5rem; display: block; }
    </style>
</head>
<body>

    <div id="login-view" class="container">
        <h2>🔐 内部系统登录</h2>
        <input type="password" id="access-pw" placeholder="请输入 6 位访问密码 (661500)">
        <button onclick="handleLogin()">确认进入</button>
        <div id="login-err" class="error-box"></div>
    </div>

    <div id="app-view" class="container hidden">
        <h2 style="margin-top:0">🖼️ GPT-Image-2 工作站</h2>
        <textarea id="prompt-input" rows="4" placeholder="描述想要生成的公司海报或分镜图..."></textarea>
        <button id="submit-btn" onclick="generateImage()">开始生成 (预计 15s)</button>
        <div id="status-text" style="margin-top:1rem; font-size:0.9rem; color:#666;"></div>
        <img id="result-img" alt="生成结果">
        <div id="error-display" class="error-box"></div>
        <button onclick="location.reload()" style="background:none; color:#999; font-size:0.8rem; margin-top:1.5rem; border:none;">退出登录</button>
    </div>

    <script>
        const PASS = "661500"; 

        function handleLogin() {
            const val = document.getElementById('access-pw').value;
            if (val === PASS) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
            } else {
                document.getElementById('login-err').innerText = "密码错误";
            }
        }

        async function generateImage() {
            const prompt = document.getElementById('prompt-input').value;
            const btn = document.getElementById('submit-btn');
            const status = document.getElementById('status-text');
            const img = document.getElementById('result-img');
            const errBox = document.getElementById('error-display');

            if (!prompt) return alert("请输入描述词");

            // 重置状态
            btn.disabled = true;
            errBox.innerHTML = "";
            img.style.display = "none";
            status.innerText = "🚀 AI 正在构思画面，请勿关闭页面...";

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, pass: PASS })
                });

                const data = await res.json();
                btn.disabled = false;

                if (data.url) {
                    img.src = data.url;
                    img.style.display = "block";
                    status.innerText = "✅ 生成成功！";
                } else {
                    status.innerText = "";
                    errBox.innerHTML = `❌ 生成失败：${data.error || '未知错误'}<br>
                                       <code class="raw-log">API响应：${data.raw || '无返回内容'}</code>`;
                }
            } catch (e) {
                btn.disabled = false;
                status.innerText = "";
                errBox.innerText = "❌ 网络连接失败或超时，请重试";
            }
        }
    </script>
</body>
</html>
