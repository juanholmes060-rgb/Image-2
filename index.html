<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 绘图</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        textarea, input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #res-img { width: 100%; border-radius: 8px; display: none; margin-top: 15px; }
        .st { margin: 15px 0; text-align: center; color: #666; font-size: 13px; }
        .box { display: none; margin-top: 15px; padding: 10px; background: #eee; border-radius: 8px; word-break: break-all; font-size: 11px; }
    </style>
</head>
<body>
<div class="card">
    <input type="password" id="pw" placeholder="密码">
    <textarea id="pt" rows="3" placeholder="画面描述词..."></textarea>
    <button id="btn" onclick="go()">生成图片</button>
    <div id="st" class="st">就绪</div>
    <img id="res-img">
    <div id="box" class="box">
        <strong>链接：</strong><a id="url" target="_blank" style="color:blue">点击打开</a>
    </div>
</div>

<script>
    let timer = null;
    async function go() {
        const pt = document.getElementById('pt').value, pw = document.getElementById('pw').value;
        const st = document.getElementById('st'), btn = document.getElementById('btn');
        if(!pt || !pw) return;
        btn.disabled = true; st.innerText = "🚀 提交中...";
        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: pt, pass: pw })
            });
            const data = await res.json();
            const tid = data.task_id || (data.data && data.data[0] && data.data[0].task_id);
            if(tid) poll(tid, pw); else {
                const u = find(data); if(u) show(u); else throw new Error("ID丢失");
            }
        } catch(e) { st.innerText = "❌ "+e.message; btn.disabled = false; }
    }

    function poll(tid, pw) {
        let sec = 0;
        timer = setInterval(async () => {
            sec += 3; document.getElementById('st').innerText = `⏳ 绘制中(${sec}s)...`;
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ taskId: tid, pass: pw })
            });
            const data = await res.json();
            const u = find(data);
            if(u) { clearInterval(timer); show(u); }
        }, 3000);
    }

    function find(o) {
        if(!o) return null;
        if(typeof o === 'string' && o.startsWith('http')) return o;
        if(o.url) return o.url;
        if(o.data && o.data[0] && o.data[0].url) return o.data[0].url;
        for(let k in o) { if(typeof o[k] === 'object') { const f = find(o[k]); if(f) return f; } }
        return null;
    }

    function show(u) {
        document.getElementById('res-img').src = u;
        document.getElementById('res-img').style.display = "block";
        document.getElementById('url').href = u;
        document.getElementById('url').innerText = u;
        document.getElementById('box').style.display = "block";
        document.getElementById('st').innerText = "✅ 完成";
        document.getElementById('btn').disabled = false;
    }
</script>
</body>
</html>
