<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API 测试工具</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    .test-section {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    h1 { color: #6366f1; }
    h2 { color: #a1a1aa; font-size: 1rem; }
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover { background: #4f46e5; }
    pre {
      background: #0a0a0a;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
    }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
    input, select {
      padding: 8px;
      margin: 5px;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      background: #0a0a0a;
      color: white;
    }
  </style>
</head>
<body>
  <h1>🔧 API 测试工具</h1>
  
  <div class="test-section">
    <h2>配置信息</h2>
    <div>
      <label>API 端点:</label>
      <input type="text" id="apiUrl" value="/api/generate" size="50">
    </div>
    <div>
      <label>API 密钥:</label>
      <input type="text" id="apiKey" value="sk-4e8Jv0gxK3wzrsAue11bLijwWcPAF53VnDXrrRIjcwiO6vWL" size="50">
    </div>
  </div>

  <div class="test-section">
    <h2>请求参数</h2>
    <div>
      <label>Prompt:</label>
      <input type="text" id="prompt" value="一只可爱的小狗" size="60">
    </div>
    <div>
      <label>Size:</label>
      <select id="size">
        <option value="">默认</option>
        <option value="1k">1K</option>
        <option value="2k">2K</option>
        <option value="4k">4K</option>
      </select>
    </div>
    <div>
      <label>Aspect Ratio:</label>
      <select id="aspectRatio">
        <option value="">默认</option>
        <option value="1:1">1:1</option>
        <option value="16:9">16:9</option>
        <option value="9:16">9:16</option>
      </select>
    </div>
    <button onclick="testApi()">🚀 发送测试请求</button>
  </div>

  <div class="test-section">
    <h2>响应结果</h2>
    <pre id="response">等待请求...</pre>
  </div>

  <div class="test-section">
    <h2>网络请求详情</h2>
    <pre id="networkInfo">无</pre>
  </div>

  <script>
    async function testApi() {
      const responseEl = document.getElementById('response');
      const networkEl = document.getElementById('networkInfo');
      const apiUrl = document.getElementById('apiUrl').value;
      const apiKey = document.getElementById('apiKey').value;
      const prompt = document.getElementById('prompt').value;
      const size = document.getElementById('size').value;
      const aspectRatio = document.getElementById('aspectRatio').value;

      responseEl.innerHTML = '⏳ 正在发送请求...';
      networkEl.innerText = '无';

      const requestBody = {
        model: 'gpt-image-2',
        prompt: prompt,
        n: 1
      };

      if (size) requestBody.size = size;
      if (aspectRatio) requestBody.aspect_ratio = aspectRatio;

      networkEl.innerText = `请求URL: ${window.location.origin}${apiUrl}
请求方法: POST
请求头:
  Content-Type: application/json
  Authorization: Bearer ${apiKey.substring(0, 10)}...

请求体:
${JSON.stringify(requestBody, null, 2)}`;

      const startTime = Date.now();

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify(requestBody)
        });

        const endTime = Date.now();
        const duration = endTime - startTime;

        const responseText = await response.text();
        const contentType = response.headers.get('content-type');

        let parsedResponse = responseText;
        try {
          parsedResponse = JSON.stringify(JSON.parse(responseText), null, 2);
        } catch (e) {
          // Keep as text
        }

        const statusClass = response.ok ? 'success' : 'error';
        
        responseEl.innerHTML = `
<span class="${statusClass}">状态: ${response.status} ${response.statusText}</span>
<span class="${statusClass}">耗时: ${duration}ms</span>

响应头:
${Array.from(response.headers.entries()).map(([k, v]) => `  ${k}: ${v}`).join('\n')}

响应体:
${parsedResponse}
        `;

        // If successful, show the image
        if (response.ok && parsedResponse.includes('url')) {
          const data = JSON.parse(responseText);
          if (data.data && data.data[0] && data.data[0].url) {
            responseEl.innerHTML += `\n\n<span class="success">✅ 图片URL: ${data.data[0].url}</span>`;
          }
        }

      } catch (error) {
        responseEl.innerHTML = `<span class="error">❌ 请求失败: ${error.message}</span>`;
        console.error('Full error:', error);
      }
    }

    // Auto-run test on page load
    window.onload = () => {
      testApi();
    };
  </script>
</body>
</html>
