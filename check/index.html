<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>端点检查</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    .test { background: #2a2a2a; padding: 20px; border-radius: 10px; margin: 20px 0; }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
    .info { color: #3b82f6; }
    pre { background: #0a0a0a; padding: 15px; border-radius: 6px; overflow-x: auto; margin: 10px 0; }
    button { background: #6366f1; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; margin: 10px 5px 10px 0; }
    button:hover { background: #4f46e5; }
    h2 { margin: 0 0 10px 0; }
    p { color: #a1a1aa; margin: 5px 0 15px 0; }
  </style>
</head>
<body>
  <h1>🔍 Vercel 端点检查</h1>
  
  <div class="test">
    <h2>1. 测试后端是否运行</h2>
    <p>检查 server.js 是否正确部署</p>
    <button onclick="testPing()">测试 /api/ping</button>
    <pre id="pingResult">等待测试...</pre>
  </div>

  <div class="test">
    <h2>2. 测试 OPTIONS 预检</h2>
    <p>检查 CORS 预检请求</p>
    <button onclick="testOPTIONS()">测试 OPTIONS</button>
    <pre id="optionsResult">等待测试...</pre>
  </div>

  <div class="test">
    <h2>3. 测试 API 端点</h2>
    <p>发送实际的 POST 请求</p>
    <button onclick="testAPI()">测试 /api/generate</button>
    <pre id="apiResult">等待测试...</pre>
  </div>

  <div class="test">
    <h2>📋 说明</h2>
    <p>如果第1步失败，说明 Vercel Function 没有正确部署。</p>
    <p>如果第2步失败，说明 OPTIONS 预检被阻止。</p>
    <p>如果第3步失败，检查 Vercel 日志中的详细错误。</p>
  </div>

  <script>
    const BASE_URL = window.location.origin;

    async function testPing() {
      const result = document.getElementById('pingResult');
      result.innerHTML = '测试中...';
      
      try {
        const response = await fetch(`${BASE_URL}/api/ping`);
        const data = await response.json();
        
        if (response.ok) {
          result.innerHTML = `<span class="success">✅ 后端运行正常!</span>
${JSON.stringify(data, null, 2)}`;
        } else {
          result.innerHTML = `<span class="error">❌ 服务器返回错误</span>
状态: ${response.status}
${JSON.stringify(data, null, 2)}`;
        }
      } catch (error) {
        result.innerHTML = `<span class="error">❌ 无法连接到后端</span>
错误: ${error.message}

这说明 server.js 没有正确部署到 Vercel!
请检查:
1. vercel.json 配置是否正确
2. Vercel 部署日志是否有错误
3. 是否有 build 错误`;
      }
    }

    async function testOPTIONS() {
      const result = document.getElementById('optionsResult');
      result.innerHTML = '测试中...';
      
      try {
        const response = await fetch('/api/generate', {
          method: 'OPTIONS'
        });
        
        result.innerHTML = `<span class="success">✅ OPTIONS 预检成功</span>
状态: ${response.status}
响应头:
${Array.from(response.headers.entries()).map(([k, v]) => `${k}: ${v}`).join('\n')}`;
      } catch (error) {
        result.innerHTML = `<span class="error">❌ OPTIONS 预检失败</span>
错误: ${error.message}

这表示 CORS 预检请求被阻止!`;
      }
    }

    async function testAPI() {
      const result = document.getElementById('apiResult');
      result.innerHTML = '测试中...';
      
      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: 'gpt-image-2',
            prompt: 'test',
            n: 1
          })
        });
        
        const text = await response.text();
        
        if (response.ok) {
          result.innerHTML = `<span class="success">✅ API 请求成功!</span>
状态: ${response.status}
响应: ${text.substring(0, 300)}`;
        } else {
          result.innerHTML = `<span class="error">❌ API 返回错误</span>
状态: ${response.status}
响应: ${text.substring(0, 500)}`;
        }
      } catch (error) {
        result.innerHTML = `<span class="error">❌ API 请求失败</span>
错误: ${error.message}`;
      }
    }

    // Auto run ping test on load
    window.onload = () => {
      testPing();
    };
  </script>
</body>
</html>
